packages:
  - "apps/*"
  - "packages/*"

# Install peer dependencies automatically (default in pnpm 8+; kept explicit).
autoInstallPeers: true

# Security pins. Moved here from package.json "pnpm.overrides" because pnpm 11
# no longer reads the "pnpm" field from package.json.
overrides:
  minimatch: "^3.1.3"
  "serve-handler>minimatch": "^3.1.3"
  fast-xml-parser: ">=5.3.8"
  serialize-javascript: ">=7.0.3"

# Dependencies allowed to run install/build (postinstall) scripts.
# pnpm 11 replaced "onlyBuiltDependencies" (a list) with "allowBuilds" (a map).
# Both are kept so the repo installs cleanly under pnpm 11 and pnpm 10.x.
allowBuilds:
  core-js: true
  cpu-features: true
  esbuild: true
  protobufjs: true
  ssh2: true
onlyBuiltDependencies:
  - core-js
  - cpu-features
  - esbuild
  - protobufjs
  - ssh2
