name: openldr
services:
  openldr-nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openldr-nginx
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # - ../../packages/openldr-core/certs:/etc/nginx/certs
      - ./certbot/www:/var/www/certbot # for HTTP challenge
      - ./certbot/conf:/etc/letsencrypt # shared certs
    networks:
      - openldr-network
    ports:
      - 80:80
      - 443:443

  certbot:
    image: certbot/certbot
    networks:
      - openldr-network
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # openldr-nginx-ui:
