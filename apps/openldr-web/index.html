<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/OpenODRv2Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenLDR — Open Laboratory Data Repository</title>
    <meta name="description" content="Open-source platform for laboratory data management and antimicrobial resistance surveillance. Brings together lab results from across facilities, translating local codes into international standards." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200;12..96,400;12..96,600;12..96,700;12..96,800&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      // Prevent flash of wrong theme
      (function(){var t=localStorage.getItem('openldr-theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
